<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Plummet — Email Preview</title>
  <style>
    body { margin: 0; padding: 0; }
  </style>
</head>
<body style="margin:0;padding:0;background:#2f3029;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#2f3029;">
    <tr><td align="center" style="padding:40px 20px;">
      <table role="presentation" width="460" cellpadding="0" cellspacing="0" style="background:#363630;border-radius:16px;overflow:hidden;border:1px solid #4a493e;">

        <!-- Header -->
        <tr><td style="background:linear-gradient(135deg,#4a493e,#3d3d35);padding:32px 40px;text-align:center;">
          <div style="font-size:32px;font-weight:800;color:#e2d8a6;letter-spacing:2px;">PLUMMET</div>
          <div style="font-size:13px;color:#b8b098;margin-top:4px;letter-spacing:1px;">WORD GAME</div>
        </td></tr>

        <!-- Body -->
        <tr><td style="padding:36px 40px 20px;">
          <p style="color:#b8b098;font-size:16px;line-height:1.6;margin:0 0 8px;">Hey there!</p>
          <p style="color:#b8b098;font-size:16px;line-height:1.6;margin:0 0 28px;">Here's your verification code to finish setting up your account:</p>
        </td></tr>

        <!-- Code -->
        <tr><td align="center" style="padding:0 40px 28px;">
          <table role="presentation" cellpadding="0" cellspacing="0">
            <tr>
              <td style="width:54px;height:64px;background:#3d3d35;border:2px solid #4a493e;border-radius:12px;text-align:center;vertical-align:middle;font-family:'Courier New',Courier,monospace;font-size:36px;font-weight:bold;color:#e2d8a6;letter-spacing:0;">4</td>
              <td style="width:8px;"></td>
              <td style="width:54px;height:64px;background:#3d3d35;border:2px solid #4a493e;border-radius:12px;text-align:center;vertical-align:middle;font-family:'Courier New',Courier,monospace;font-size:36px;font-weight:bold;color:#e2d8a6;letter-spacing:0;">7</td>
              <td style="width:8px;"></td>
              <td style="width:54px;height:64px;background:#3d3d35;border:2px solid #4a493e;border-radius:12px;text-align:center;vertical-align:middle;font-family:'Courier New',Courier,monospace;font-size:36px;font-weight:bold;color:#e2d8a6;letter-spacing:0;">2</td>
              <td style="width:8px;"></td>
              <td style="width:54px;height:64px;background:#3d3d35;border:2px solid #4a493e;border-radius:12px;text-align:center;vertical-align:middle;font-family:'Courier New',Courier,monospace;font-size:36px;font-weight:bold;color:#e2d8a6;letter-spacing:0;">8</td>
              <td style="width:8px;"></td>
              <td style="width:54px;height:64px;background:#3d3d35;border:2px solid #4a493e;border-radius:12px;text-align:center;vertical-align:middle;font-family:'Courier New',Courier,monospace;font-size:36px;font-weight:bold;color:#e2d8a6;letter-spacing:0;">3</td>
            </tr>
          </table>
        </td></tr>

        <!-- Subtext -->
        <tr><td style="padding:0 40px 36px;">
          <p style="color:#8a8570;font-size:13px;line-height:1.5;margin:0;text-align:center;">
            Enter this code in the app to continue.<br>It expires in <strong style="color:#e2d8a6;">30 minutes</strong>.
          </p>
        </td></tr>

        <!-- Divider -->
        <tr><td style="padding:0 40px;"><div style="border-top:1px solid #4a493e;"></div></td></tr>

        <!-- Footer -->
        <tr><td style="padding:24px 40px 28px;text-align:center;">
          <p style="color:#8a8570;font-size:12px;line-height:1.5;margin:0;">
            If you didn't request this code, just ignore this email.<br>
            &copy; 2026 Plummet
          </p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
