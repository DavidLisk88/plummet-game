<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Plummet — Password Reset Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg:          #2f3029;
      --bg-surface:  #363630;
      --bg-card:     #3d3d35;
      --border:      #4a493e;
      --border-light:#5c5b4c;
      --text:        #e2d8a6;
      --text-muted:  #b8b098;
      --text-dim:    #8a8570;
      --accent:      #e2d8a6;
      --shadow-sm:   0 1px 3px rgba(0,0,0,0.3);
      --shadow-md:   0 4px 12px rgba(0,0,0,0.4);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1.5rem;
      gap: 0.75rem;
      width: 100%;
      max-width: 420px;
    }
    .title {
      font-size: 3rem;
      font-weight: 200;
      letter-spacing: 0.25em;
      color: var(--accent);
      margin-bottom: 4px;
      white-space: nowrap;
    }
    .auth-subtitle {
      color: #888;
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      max-width: 320px;
    }
    .auth-info {
      color: #aaa;
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.4;
      color: var(--text-dim);
    }
    .text-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .text-input:focus {
      border-color: var(--accent);
    }
    .text-input::placeholder {
      color: var(--text-dim);
    }
    .primary-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 14px 48px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
      box-shadow: var(--shadow-sm);
    }
    .primary-btn:hover {
      opacity: 0.9;
      box-shadow: var(--shadow-md);
    }
    .primary-btn:active {
      transform: scale(0.97);
    }
  </style>
</head>
<body>
  <div id="auth-screen">
    <h1 class="title">PLUMMET</h1>
    <p class="auth-subtitle">Reset your password</p>

    <div class="auth-form">
      <p class="auth-info">Enter your new password below.</p>
      <input type="password" class="text-input" placeholder="New password (8+ characters)" value="••••••••••">
      <input type="password" class="text-input" placeholder="Confirm new password" value="••••••••••">
      <button class="primary-btn" style="width:100%;max-width:280px">Update Password</button>
    </div>
  </div>
</body>
</html>
